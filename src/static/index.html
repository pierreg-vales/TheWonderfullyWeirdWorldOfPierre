<!DOCTYPE html>
<html>
    <title>The Archive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .category {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .item {
            background: #f5f5f5;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
        }
        input {
            padding: 5px;
            width: 300px;
        }
    </style>
    <body>
        <h1>The Archive</h1>
        <div id="archive"></div>

        <hr>

        <h2>Add New Item</h2>
        <input type="text" id="category" placeholder="Category">
        <input type="text" id="item" placeholder="Item">
        <button onclick="addItem()">Add</button>

        <script src="static/app.js"></script>
    </body>
</html>
